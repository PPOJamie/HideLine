<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0b1f33" />
  <title>HideLine - Offline</title>
  <style>
    :root{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#10283d;background:#edf3f7}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px}
    main{max-width:520px;background:#fff;border-radius:24px;padding:28px;box-shadow:0 24px 70px rgba(11,31,51,.18)}
    h1{margin:0 0 10px;font-size:2rem}p{line-height:1.6}button{border:0;border-radius:14px;background:#0b1f33;color:#fff;padding:13px 18px;font-weight:700;font-size:1rem;cursor:pointer}
  </style>
</head>
<body>
  <main>
    <h1>You are offline</h1>
    <p>The local game board, rules, timers and score tools remain available after the app has been opened once. Live team sync, map tiles and TfL status need a connection.</p>
    <button onclick="location.reload()">Try again</button>
  </main>
</body>
</html>
