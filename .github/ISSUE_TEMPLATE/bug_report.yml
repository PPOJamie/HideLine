name: Bug report
description: Report a reproducible problem without sharing live room or location data.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Please remove room codes, private map details, photos and exact live locations before submitting."
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: "2.1.3 or commit SHA"
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options: ["Local Mode", "Connected Mode", "Both"]
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Create a game…\n2. Start round…"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and device
      placeholder: "Safari 18 on iPhone 15"
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed room codes, precise locations, private photos and credentials.
          required: true
