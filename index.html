<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1f33" />
    <meta name="description" content="HideLine is a simple London hide-and-seek companion with live game alerts, clickable question coordinates, a high-contrast Endgame map, timers, scoring and optional team sync." />
    <meta name="color-scheme" content="light dark" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HideLine" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./assets/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png" />
    <link rel="stylesheet" href="./src/styles.css?v=2.2.1" />
    <title>HideLine - London Hide + Seek Companion</title>
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to main content</a>
    <div id="app" aria-live="polite">
      <div class="boot-screen" role="status">
        <img src="./assets/icon.svg" alt="" width="72" height="72" />
        <div>
          <strong>HideLine</strong>
          <span>Getting the game ready...</span>
        </div>
      </div>
    </div>
    <noscript>
      <main class="noscript-card">
        <h1>JavaScript is required</h1>
        <p>HideLine runs entirely in your browser and needs JavaScript for timers, game state and multiplayer sync.</p>
      </main>
    </noscript>
    <script>
      window.__HIDELINE_EXPECTED_VERSION__ = "2.2.1";
      window.setTimeout(() => {
        if (window.__HIDELINE_LOADED_VERSION__ === window.__HIDELINE_EXPECTED_VERSION__) return;
        const warning = document.createElement("aside");
        warning.id = "deployment-version-warning";
        warning.setAttribute("role", "alert");
        warning.style.cssText = "position:fixed;z-index:99999;left:12px;right:12px;bottom:12px;padding:14px 16px;border:3px solid #8b1d35;border-radius:14px;background:#fff1f3;color:#4b0b18;font:600 15px/1.4 system-ui,sans-serif;box-shadow:0 12px 36px rgba(0,0,0,.25)";
        warning.textContent = "HideLine deployment is incomplete: the page is version 2.2.1 but an older app file is still loading. Re-upload the complete src folder and refresh.";
        document.body.append(warning);
      }, 7000);
    </script>
    <script src="./config.js"></script>
    <script type="module" src="./src/app.js?v=2.2.1"></script>
  </body>
</html>
