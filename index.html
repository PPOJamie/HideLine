<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1f33" />
    <meta name="description" content="HideLine is a simple London hide-and-seek companion with a live deduction map, carried-forward Endgame clues, map-picked coordinates, timers, scoring and optional team sync." />
    <meta name="color-scheme" content="light dark" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HideLine" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./assets/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png" />
    <link rel="stylesheet" href="./src/styles.css?v=2.1.3" />
    <title>HideLine - London Hide + Seek Companion</title>
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to main content</a>
    <div id="app" aria-live="polite">
      <div class="boot-screen" role="status">
        <img src="./assets/icon.svg" alt="" width="72" height="72" />
        <div>
          <strong>HideLine</strong>
          <span>Getting the game ready...</span>
        </div>
      </div>
    </div>
    <noscript>
      <main class="noscript-card">
        <h1>JavaScript is required</h1>
        <p>HideLine runs entirely in your browser and needs JavaScript for timers, game state and multiplayer sync.</p>
      </main>
    </noscript>
    <script src="./config.js"></script>
    <script type="module" src="./src/app.js?v=2.1.3"></script>
  </body>
</html>
